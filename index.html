<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Rating · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green: #10b981;
        --green-dark: #059669;
        --green-light: #ecfdf5;
        --green-mid: #6ee7b7;
        --slate: #0f172a;
        --slate-mid: #475569;
        --slate-light: #94a3b8;
        --bg: #f0f4f8;
        --card: #ffffff;
        --border: #e8edf2;
        --red: #ef4444;
        --red-light: #fef2f2;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: var(--slate);
        -webkit-font-smoothing: antialiased;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
        animation: fadeUp 0.4s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 24px;
        text-align: center;
      }

      .logo-mark {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--green), var(--green-dark));
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        margin-bottom: 12px;
      }

      .logo-mark svg {
        width: 24px;
        height: 24px;
        color: #fff;
      }

      .logo-title {
        font-family: "Sora", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--slate);
        line-height: 1.2;
      }

      .logo-sub {
        font-size: 12px;
        color: var(--slate-light);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .login-box {
        background: var(--card);
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 32px;
        box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05);
      }

      .login-box h2 {
        font-family: "Sora", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--slate);
        margin-bottom: 24px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group label {
        display: block;
        margin-bottom: 6px;
        color: var(--slate-mid);
        font-size: 13px;
        font-weight: 600;
      }

      .input-group input {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-family: inherit;
        color: var(--slate);
        background: var(--card);
        outline: none;
        transition: all 0.2s;
      }

      .input-group input:focus {
        border-color: var(--green-mid);
        box-shadow: 0 0 0 3px rgba(110, 231, 183, 0.2);
      }

      .login-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
      }

      .login-btn:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .message {
        margin-top: 16px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        padding: 10px;
        border-radius: 8px;
        display: none;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="brand-header">
        <div class="logo-mark">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <div class="logo-title">Driver Rating</div>
        <div class="logo-sub">Management Portal</div>
      </div>

      <div class="login-box">
        <h2>Sign In</h2>
        <form id="loginForm">
          <div class="input-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
            />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="login-btn">Log In</button>
          <div class="message" id="message"></div>
        </form>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://vioupfkhpdyfbuatjtxr.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpb3VwZmtocGR5ZmJ1YXRqdHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTU0OTcsImV4cCI6MjA5MjkzMTQ5N30.KpQ3syRkSzCyPgkbeVX6OYY8pu13QshL-iQ2F48Vevk";

      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      async function login(username, password) {
        const msgEl = document.getElementById("message");
        msgEl.style.display = "block";
        msgEl.style.background = "#f1f5f9";
        msgEl.style.color = "var(--slate-mid)";
        msgEl.innerText = "Authenticating...";

        try {
          // Pointed to your actual 'user_accounts' table structure
          const { data, error } = await _supabase
            .from("user_accounts")
            .select("*")
            .eq("username", username);

          if (error) throw error;

          if (!data || data.length === 0) {
            msgEl.style.background = "var(--red-light)";
            msgEl.style.color = "var(--red)";
            msgEl.innerText = "User not found";
            return;
          }

          const user = data[0];

          // Compares username matching row's password_hash column against password text input
          if (user.password_hash === password) {
            localStorage.setItem("loggedUser", JSON.stringify(user));
            localStorage.setItem("userRole", user.role);

            msgEl.style.background = "var(--green-light)";
            msgEl.style.color = "var(--green-dark)";
            msgEl.innerText = "Login successful! Redirecting...";

            setTimeout(() => {
              window.location.href = "admin.html";
            }, 600);
          } else {
            msgEl.style.background = "var(--red-light)";
            msgEl.style.color = "var(--red)";
            msgEl.innerText = "Wrong password";
          }
        } catch (error) {
          console.error("Database connection error details:", error);
          msgEl.style.background = "var(--red-light)";
          msgEl.style.color = "var(--red)";
          msgEl.innerText = `Error: ${error.message || JSON.stringify(error)}`;
        }
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          login(username, password);
        });
    </script>
  </body>
</html>
